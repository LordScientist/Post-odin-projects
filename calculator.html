<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="main">
        <div class="calculator">
            <div class="display">
                <div class="calculation" contenteditable="true" data-placeholder="calculation"></div>
                <div class="output"  contenteditable="true" data-placeholder="results"></div>
            </div>
            <div class="buttons">
                <div class="container">
                        <div class="number">
                            <button class="btn" data-value="9">9</button>
                            <button class="btn" data-value="8">8</button>
                            <button class="btn" data-value="7">7</button>
                            <button class="btn" data-value="6">6</button>
                            <button class="btn" data-value="5">5</button>
                            <button class="btn" data-value="4">4</button>
                            <button class="btn" data-value="3">3</button>
                            <button class="btn" data-value="2">2</button>
                            <button class="btn" data-value="1">1</button>
                            <button class="btn" data-value="0">0</button>
                            <button class="btn" data-value=".">.</button>
                        </div>

                        <div class="symbol">
                            <button class="sym" data-action="+">+</button>
                            <button class="sym" data-action="-">-</button>
                            <button class="sym" data-action="/">&divide;</button>
                            <button class="sym" data-action="*">&times;</button>
                            <button class="sym" data-action="=" id="equal">=</button>
                            <button class="sym" data-action="C" id="clear">C</button>
                            
                        </div>
                    </div>
                </div>                
            </div>
        </div>
    </div>
    <script src="calculator.js" defer></script>
</body>
</html>
